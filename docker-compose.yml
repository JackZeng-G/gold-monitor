services:
  gold-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: gold-monitor:latest
    container_name: gold-monitor
    restart: unless-stopped
    ports:
      - "20031:8081"
    environment:
      - TZ=Asia/Shanghai
      - GIN_MODE=release
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
